models:
  User:
    name: string:100
    email: string:120 unique
    password: string:255
    timestamps: true
    relationships:
      hasMany: Form, Response

  Form:
    title: string:200
    description: text nullable
    created_by: foreign:users.id
    status: string:50 default:draft
    is_public: boolean default:false
    timestamps: true
    relationships:
      belongsTo: User:created_by
      hasMany: Question, Response

  Question:
    form_id: foreign:forms.id
    type: string:50 # text, multiple_choice, checkbox, file
    content: text
    is_required: boolean default:false
    order: integer
    timestamps: true
    relationships:
      belongsTo: Form
      hasMany: Option, Answer

  Option:
    question_id: foreign:questions.id
    value: string:255
    timestamps: true
    relationships:
      belongsTo: Question

  Response:
    form_id: foreign:forms.id
    user_id: foreign:users.id nullable
    submitted_at: datetime
    timestamps: true
    relationships:
      belongsTo: Form, User
      hasMany: Answer

  Answer:
    response_id: foreign:responses.id
    question_id: foreign:questions.id
    value: text nullable
    timestamps: true
    relationships:
      belongsTo: Response, Question
